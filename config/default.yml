# ═══════════════════════════════════════════════════════════════
# Liquifier Default Configuration
# ═══════════════════════════════════════════════════════════════
# This file is embedded at compile-time. Environment-specific
# overrides go in config/production.yml (or via APP__* env vars).

# ─── Application ──────────────────────────────────────────────
application:
  environment: development

# ─── Database ─────────────────────────────────────────────────
database:
  url: "postgresql://liquifier:liquifier@localhost:5432/liquifier"
  max_connections: 10

# ─── Redis ────────────────────────────────────────────────────
redis:
  url: "redis://localhost:6379"

# ─── NATS ─────────────────────────────────────────────────────
nats:
  url: "nats://localhost:4222"

# ─── JWT / Auth ───────────────────────────────────────────────
auth:
  jwt_secret: "dev-jwt-secret-change-in-production"
  access_token_expiry_secs: 3600      # 1 hour
  refresh_token_expiry_secs: 604800   # 7 days
  admin_email: ""                      # Override via APP__AUTH__ADMIN_EMAIL
  admin_password: ""                   # Override via APP__AUTH__ADMIN_PASSWORD

# ─── KMS ──────────────────────────────────────────────────────
kms:
  grpc_port: 50051
  grpc_addr: "http://localhost:50051"
  master_encryption_key: ""  # 64 hex chars — MUST set via env

# ─── Session API ──────────────────────────────────────────────
session_api:
  grpc_port: 50052
  grpc_addr: "http://localhost:50052"
  evm_rpc_url: ""

# ─── SMTP / Email ─────────────────────────────────────────────
smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from_email: "noreply@liquifier.io"
  from_name: "Liquifier"
  base_url: "http://localhost:3000"

# ─── API Gateway ──────────────────────────────────────────────
api_gateway:
  http_port: 8080

# ─── WebSocket Service ────────────────────────────────────────
websocket:
  http_port: 8081
  grpc_port: 50053
  grpc_addr: "http://localhost:50053"

# ─── Indexer ────────────────────────────────────────────────
indexer:
  worker_count: 3
  block_queue_size: 1024
  block_poll_interval_ms: 250
  max_block_age_secs: 60

# ─── Execution Engine ────────────────────────────────────────
execution:
  max_price_impact_bps: 500  # global safety cap, 5%
  investor_wallet: ""        # Override via APP__EXECUTION__INVESTOR_WALLET
  buy_trigger_oracle_address: "0x06fd4EBfd011574F6915DE69991e3CfdD3dfC30f"  # Override via APP__EXECUTION__BUY_TRIGGER_ORACLE_ADDRESS

# ─── Pricing ──────────────────────────────────────────────────
pricing:
  update_interval_secs: 30          # refresh base-token prices every N seconds

# ═══════════════════════════════════════════════════════════════
