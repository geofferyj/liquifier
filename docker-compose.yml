version: "3.9"

# ──────────────────────────────────────────────────────────────────────────
# DEVELOPMENT / LOCAL USE ONLY
# Before deploying to production, replace ALL placeholder secrets:
#   - JWT_SECRET (minimum 32 random characters)
#   - MASTER_ENCRYPTION_KEY (32-byte random key: openssl rand -base64 32)
#   - postgres/redis passwords
# ──────────────────────────────────────────────────────────────────────────

networks:
  liquifier-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: liquifier-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: liquifier
      POSTGRES_PASSWORD: liquifier_secret
      POSTGRES_DB: liquifier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - liquifier-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liquifier"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: liquifier-redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - liquifier-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: liquifier-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - liquifier-net
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: liquifier-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - liquifier-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Microservices ─────────────────────────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: liquifier-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://liquifier:liquifier_secret@postgres:5432/liquifier
      REDIS_URL: redis://:redis_secret@redis:6379
      JWT_SECRET: change_me_in_production_jwt_secret_min_32chars
      KMS_GRPC_ADDR: http://kms:50051
      SESSIONS_GRPC_ADDR: http://sessions:50052
      BIND_ADDR: "0.0.0.0:8080"
    ports:
      - "8080:8080"
    networks:
      - liquifier-net

  kms:
    build:
      context: ./kms
      dockerfile: Dockerfile
    container_name: liquifier-kms
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://liquifier:liquifier_secret@postgres:5432/liquifier
      # 32-byte base64-encoded master encryption key (replace in production)
      MASTER_ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      BIND_ADDR: "0.0.0.0:50051"
      EVM_RPC_URL: "wss://mainnet.infura.io/ws/v3/YOUR_INFURA_KEY"
    networks:
      - liquifier-net
    # KMS is NOT exposed to the public internet — no ports mapping

  sessions:
    build:
      context: ./sessions
      dockerfile: Dockerfile
    container_name: liquifier-sessions
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kms:
        condition: service_started
    environment:
      DATABASE_URL: postgres://liquifier:liquifier_secret@postgres:5432/liquifier
      KMS_GRPC_ADDR: http://kms:50051
      BIND_ADDR: "0.0.0.0:50052"
      EVM_RPC_URL: "https://mainnet.infura.io/v3/YOUR_INFURA_KEY"
    networks:
      - liquifier-net

  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: liquifier-indexer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      EVM_WS_URL: "wss://mainnet.infura.io/ws/v3/YOUR_INFURA_KEY"
      KAFKA_TOPIC_DEX_SWAPS: evm.dex.swaps
    networks:
      - liquifier-net

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: liquifier-engine
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      kms:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://liquifier:liquifier_secret@postgres:5432/liquifier
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_DEX_SWAPS: evm.dex.swaps
      KAFKA_TOPIC_TRADES_COMPLETED: trades.completed
      KMS_GRPC_ADDR: http://kms:50051
      EVM_RPC_URL: "https://mainnet.infura.io/v3/YOUR_INFURA_KEY"
      # Flashbots relay endpoint
      FLASHBOTS_RELAY_URL: "https://relay.flashbots.net"
    networks:
      - liquifier-net

  ws-metrics:
    build:
      context: ./ws-metrics
      dockerfile: Dockerfile
    container_name: liquifier-ws-metrics
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC_TRADES_COMPLETED: trades.completed
      KAFKA_TOPIC_SESSION_UPDATES: session.updates
      DATABASE_URL: postgres://liquifier:liquifier_secret@postgres:5432/liquifier
      BIND_ADDR: "0.0.0.0:8081"
    ports:
      - "8081:8081"
    networks:
      - liquifier-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: liquifier-frontend
    restart: unless-stopped
    depends_on:
      - gateway
      - ws-metrics
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      NEXT_PUBLIC_WS_URL: "ws://localhost:8081"
    ports:
      - "3000:3000"
    networks:
      - liquifier-net
